name: Calculator Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r BE/requirements.txt
          pip install pytest requests openapi-python-client fastapi uvicorn

      - name: Start REST API
        run: |
          export PYTHONPATH=.
          python BE/calculator.py --rest --port 5001 > api_log.txt 2>&1 &
          sleep 10

      - name: Run tests
        run: |
          export PYTHONPATH=.
          pytest --junit-xml=report.xml

      - name: Print API Logs (if failed)
        if: failure()
        run: cat api_log.txt

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v3
        if: always()
        with:
          report_paths: '**/report.xml'

  build-and-push:
    needs: test 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: judevops.azurecr.io
          username: ${{ secrets.AZURE_USERNAME }}
          password: ${{ secrets.AZURE_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./BE
          file: ./BE/Dockerfile
          push: true
          tags: judevops.azurecr.io/fady-calculator:latest