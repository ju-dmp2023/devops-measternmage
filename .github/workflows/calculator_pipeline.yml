name: Calculator Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r BE/requirements.txt
          pip install pytest requests openapi-python-client fastapi uvicorn pytest-playwright

      - name: Install Playwright Browsers
        run: |
          playwright install --with-deps

      - name: Start App with Docker Compose
        run: docker compose -p webcalculator up -d

      - name: Run All Tests
        run: |
          export PYTHONPATH=.
          # Run API tests and Web E2E tests together
          # We use --junit-xml to make sure the report is generated for both
          pytest --junit-xml=report.xml test/web/test_e2e.py test/ # Adjust paths if needed

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v3
        if: always()
        with:
          report_paths: '**/report.xml'

  build-and-push:
    needs: test 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: judevops.azurecr.io
          username: ${{ secrets.AZURE_USERNAME }}
          password: ${{ secrets.AZURE_PASSWORD }}

      - name: Build and push BE
        uses: docker/build-push-action@v5
        with:
          context: ./BE
          file: ./BE/Dockerfile
          push: true
          tags: judevops.azurecr.io/fady-calculator-be:latest 

      - name: Build and push FE
        uses: docker/build-push-action@v5
        with:
          context: ./FE
          file: ./FE/Dockerfile
          push: true
          tags: judevops.azurecr.io/fady-calculator-fe:latest